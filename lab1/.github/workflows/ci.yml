name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lab1/package-lock.json

      - name: Install dependencies
        working-directory: lab1
        run: npm ci

      - name: Run tests
        working-directory: lab1
        run: npm run test:ci
